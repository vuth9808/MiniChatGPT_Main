<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />

  <!-- Responsive & Mobile First -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#0F172A" />

  <!-- Branding & Favicon -->
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="apple-touch-icon" href="/logo.png" />

  <!-- SEO Meta Tags -->
  <title>Mini ChatGPT - Free AI Chat</title>

  <meta name="description"
    content="Free AI chat application powered by Gemini API. Experience a smart, fast chatbot similar to ChatGPT. Start chatting with advanced AI today." />

  <meta name="keywords"
    content="AI chat, chatbot, Gemini API, ChatGPT clone, free AI chatbot, conversational AI, artificial intelligence" />

  <meta name="author" content="Mini ChatGPT" />
  <meta name="creator" content="Hoang Vu" />
  <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
  <meta name="googlebot" content="index, follow" />
  <meta name="language" content="en-US" />

  <!-- Open Graph / Social Media -->
  <meta property="og:site_name" content="Mini ChatGPT" />
  <meta property="og:title" content="Mini ChatGPT - Free AI Chat App" />
  <meta property="og:description"
    content="Experience a free AI chatbot similar to ChatGPT powered by Gemini API." />
  <meta property="og:image" content="/logo.png" />
  <meta property="og:image:type" content="image/svg+xml" />
  <meta property="og:image:width" content="200" />
  <meta property="og:image:height" content="200" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://minichatgpt.app" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Mini ChatGPT - Free AI Chat" />
  <meta name="twitter:description" content="Free AI chatbot powered by Gemini" />
  <meta name="twitter:image" content="/logo.png" />

  <!-- JSON-LD Structured Data -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Mini ChatGPT",
      "description": "Free AI chat application powered by Gemini API",
      "url": "https://minichatgpt.app",
      "applicationCategory": "Productivity",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "image": "/logo.png",
      "creator": {
        "@type": "Person",
        "name": "Hoang Vu"
      }
    }
  </script>

 

</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
